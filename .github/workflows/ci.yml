name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  checks:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install toolchain
      - name: Install deps (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-format clang-tidy

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install -y llvm cmake ninja

      - name: Run all checks
        run: |
          python tools/check.py all
